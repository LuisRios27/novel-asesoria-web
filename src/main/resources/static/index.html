<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Nóvel Asesoría - Iniciar Sesión</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
    
    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="login-header">
                <img src="logo-novel.png" alt="Logo Nóvel Asesoría" class="login-logo">
                <p>PORTAL DE SEGUIMIENTO DE ASESORIA</p>
            </div>
            
            <form id="login-form" class="login-form">
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                </div>
                
                <button type="submit" id="submit-btn" class="btn-primary">Ingresar</button>
            </form>
            
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
